<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
    *{
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    } 

    body{
        background: white;
        padding: 20px;
    }
    .container{
        max-width: 900px;
        margin: auto;
        background-color: rgb(255, 255, 255);
        padding: 20px;
        border: 2px solid #000;
    }

    h1{
        margin-bottom: 20px;
        font-size: 30px;
        color: #000;
    }
    .row{
        display: flex;
        gap: 20px;
        margin-bottom: 15px;
    }
    .row input{
        flex: auto;
    }

    input, textarea{
        width: 100%;
        padding: 12px;
        border: 1px solid #3e3c3c;
        border-radius: 3px;
        font-size: 14px;
    }

    textarea{
        height: 250px;
        margin-bottom: 15px;
    }

    .bottom{
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    button{
        padding: 10px 20px;
        border-radius: 5px;
        background: #6daee7;
        color: white;
        border: #3686cb;
        cursor: pointer;
    }
    .note{
        color: gray;
        font-size: 13px;
    }
    </style>
</head>
<body>

<div class="container">
    <h1>Get in touch with us by filling contact form below</h1>

    <form>
        <div class="row">
            <input type="text" placeholder="*Enter your full name">
            <input type="email" placeholder="*Enter your email address">
        </div>

        <input type="text" placeholder="Enter your subject" style="margin-bottom:15px;">
        <textarea placeholder="* Your message here..." required></textarea>

        <div class="bottom">
            <button type="submit">Send message</button>
            <div class="note">*Please fill all required</div>
        </div>  
    </form>
</div>

</body>
</html>
