<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Quản lý sinh viên</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h2>Quản lý sinh viên</h2>

    <div class="form">
        <label>Họ tên:</label>
        <input type="text" id="name">

        <label>Điểm:</label>
        <input type="number" id="mark" min="0" max="10">

        <button id="add" type="button">Thêm</button>
    </div>
    <br>
    <input type="text" id="search" placeholder="Tìm kiếm tên....">
    <select id="filter">
        <option value="all">Tất cả</option>
        <option value="Giỏi">Giỏi</option>
        <option value="Khá">Khá</option>
        <option value="Trung bình">Trung bình</option>
        <option value="Yếu">Yếu</option>
    </select>

    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Họ tên</th>
                <th>Điểm</th>
                <th>Xếp loại</th>
                <th>Thao tác</th>
            </tr>
        </thead>

        <tbody id="tableBody"></tbody>

    </table>

    <p id="stats"></p>

    <script src="bth4.js"></script>

</body>

</html>
